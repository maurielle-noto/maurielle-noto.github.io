<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact · Maurielle Noto</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Inconsolata:wght@200;300;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css" />

  <style>
    .contact-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 5rem;
      align-items: start;
    }

    .contact-form {
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    .form-field {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .form-field label {
      font-family: var(--font-nav);
      font-size: 0.65rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--color-accent2);
      font-weight: 600;
    }

    .form-field input,
    .form-field textarea {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      padding: 0.75rem 1rem;
      font-family: var(--font-body);
      font-size: 0.95rem;
      color: var(--color-text);
      width: 100%;
      transition: border-color 0.2s;
      outline: none;
    }

    .form-field input:focus,
    .form-field textarea:focus {
      border-color: var(--color-accent);
    }

    .form-field textarea {
      resize: vertical;
      min-height: 150px;
    }

    .form-submit {
      font-family: var(--font-nav);
      font-size: 0.72rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      font-weight: 600;
      color: var(--color-surface);
      background: var(--color-text);
      border: none;
      padding: 0.9rem 2rem;
      cursor: pointer;
      transition: background 0.2s;
      align-self: flex-start;
    }

    .form-submit:hover {
      background: var(--color-accent);
    }

    .contact-info {
      padding-top: 0.5rem;
    }

    .contact-info p {
      margin-bottom: 2rem;
    }

    @media (max-width: 680px) {
      .contact-grid {
        grid-template-columns: 1fr;
        gap: 3rem;
      }
    }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="nav-name">Maurielle Noto</a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="research.html">Research</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="cv.pdf" target="_blank">CV</a></li>
      <li><a href="contact.html" class="active">Contact</a></li>
    </ul>
  </nav>

  <main class="page-wrap">
    <section class="section">

      <span class="label">Contact</span>
      <h1 class="italic-heading">Get in Touch</h1>

      <div class="contact-grid">

          <ul class="contact-list">
            <li>
              <span class="contact-label">Email</span>
              <a href="mailto:your@email.com">minoto@mit.edu</a>
            </li>
            <li>
              <span class="contact-label">GitHub</span>
              <a href="https://github.com/maurielle-noto" target="_blank">maurielle-noto</a>
              
            </li>
          </ul>
        </div>

        <form class="contact-form" action="https://formspree.io/f/xnjggqrn" method="POST">

          <div class="form-field">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" placeholder="Your name" required />
          </div>

          <div class="form-field">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="your@email.com" required />
          </div>

          <div class="form-field">
            <label for="subject">Subject</label>
            <input type="text" id="subject" name="subject" placeholder="What's this about?" />
          </div>

          <div class="form-field">
            <label for="message">Message</label>
            <textarea id="message" name="message" placeholder="Your message..." required></textarea>
          </div>

          <button type="submit" class="form-submit">Send Message →</button>

        </form>

      </div>

    </section>
  </main>

  <footer>
    © 2026 Maurielle Noto
  </footer>

</body>
</html>
